<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Coberturas APO - Original</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #003366; --accent: #00b1b2; --bg: #f0f4f7; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 0; }

        /* Barra Superior */
        .nav-header { background: var(--primary); color: white; padding: 12px 30px; display: flex; justify-content: space-between; font-size: 14px; }

        /* Tarjeta Blanca Centrada (EL MODELO ORIGINAL) */
        .main-card { 
            max-width: 1000px; 
            margin: 30px auto; 
            background: white; 
            padding: 35px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; font-size: 20px; text-transform: uppercase; }

        /* Secciones de Formulario */
        .section-box { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #fcfcfc; }
        .section-title { font-size: 11px; font-weight: bold; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #eee; }

        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .full { grid-column: span 3; }

        label { font-weight: bold; margin-bottom: 5px; color: #444; font-size: 12px; }
        input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; }
        
        /* Botones Estilo Original */
        .btn-group { display: flex; gap: 10px; margin: 20px 0; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-excel { background: #28a745; color: white; }
        .btn-import { background: #6c757d; color: white; }

        /* Buscador */
        .search-bar { background: #eef2f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .search-bar input { flex-grow: 1; border: 2px solid var(--primary); padding: 8px; border-radius: 4px; }

        /* Tabla Profesional */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: top; }
        tr:nth-child(even) { background: #f9f9f9; }

        .footer { text-align: center; margin-top: 20px; font-size: 11px; color: #999; }
    </style>
</head>
<body>

<div class="nav-header">
    <strong>APO - Gestión de Personal</strong>
    <span>SIPROSA - Tucumán</span>
</div>

<div class="main-card">
    <h2>Registro de Cobertura Provisoria</h2>
    
    <form id="formApo">
        <div class="section-box">
            <div class="section-title">Datos del Agente y Cargo</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Estado</label>
                    <select id="estado"><option>PENDIENTE</option><option>AUTORIZADO</option><option>BAJA</option></select>
                </div>
                <div class="form-group">
                    <label>Apellido y Nombre</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label>DNI</label>
                    <input type="number" id="dni" required>
                </div>
                <div class="form-group">
                    <label>Nivel</label>
                    <select id="nivel"><option>A1</option><option>A2</option><option>B1</option><option>C</option></select>
                </div>
                <div class="form-group">
                    <label>Función</label>
                    <input type="text" id="funcion" required>
                </div>
                <div class="form-group">
                    <label>Agrupamiento</label>
                    <select id="agrupamiento"><option>ASISTENCIAL</option><option>NO ASISTENCIAL</option></select>
                </div>
            </div>
        </div>

        <div class="section-box">
            <div class="section-title">Efector y Vigencia</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Organismo (Efector)</label>
                    <select id="organismo">
                        <option>APO</option><option>TAFI DEL VALLE</option><option>LULES</option><option>FAMAILLA</option>
                    </select>
                </div>
                <div class="form-group"><label>Desde</label><input type="date" id="desde"></div>
                <div class="form-group"><label>Hasta</label><input type="date" id="hasta"></div>
                <div class="form-group"><label>Pres. Depto</label><input type="date" id="pDepto"></div>
                <div class="form-group"><label>Pres. RRHH</label><input type="date" id="pRRHH"></div>
            </div>
        </div>

        <div class="section-box">
            <div class="section-title">Observaciones</div>
            <textarea id="obs" class="full" rows="2" style="width:100%"></textarea>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-add">Registrar Agente</button>
            <button type="button" class="btn-excel" onclick="exportar()">Descargar Excel</button>
            <input type="file" id="importFile" style="display:none" onchange="importar(this)">
            <button type="button" class="btn-import" onclick="document.getElementById('importFile').click()">Importar Excel</button>
        </div>
    </form>

    <div class="search-bar">
        <strong>🔍 BUSCAR:</strong>
        <input type="text" id="buscador" placeholder="Buscar por DNI o Nombre..." oninput="filtrar()">
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Estado</th>
                    <th>Efector</th>
                    <th>Agente / DNI</th>
                    <th>Cargo / Nivel</th>
                    <th>Vigencia</th>
                    <th>Presentación</th>
                    <th>Observaciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo"></tbody>
        </table>
    </div>

    <div class="footer">Área Programática Oeste | Tucumán</div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('db_apo_full')) || [];
    render();

    document.getElementById('formApo').addEventListener('submit', function(e) {
        e.preventDefault();
        const r = {
            id: Date.now(),
            estado: document.getElementById('estado').value,
            nombre: document.getElementById('nombre').value.toUpperCase(),
            dni: document.getElementById('dni').value,
            nivel: document.getElementById('nivel').value,
            funcion: document.getElementById('funcion').value.toUpperCase(),
            agrupamiento: document.getElementById('agrupamiento').value,
            organismo: document.getElementById('organismo').value,
            desde: document.getElementById('desde').value,
            hasta: document.getElementById('hasta').value,
            pDepto: document.getElementById('pDepto').value,
            pRRHH: document.getElementById('pRRHH').value,
            obs: document.getElementById('obs').value.toUpperCase() || 'SIN OBS.'
        };
        db.push(r);
        guardar();
        this.reset();
    });

    function guardar() {
        localStorage.setItem('db_apo_full', JSON.stringify(db));
        render();
    }

    function render(data = db) {
        const t = document.getElementById('cuerpo');
        t.innerHTML = "";
        [...data].reverse().forEach(r => {
            t.innerHTML += `<tr>
                <td><b>${r.estado}</b></td>
                <td>${r.organismo}</td>
                <td>${r.nombre}<br><small>${r.dni}</small></td>
                <td>${r.funcion}<br><small>${r.nivel} - ${r.agrupamiento}</small></td>
                <td>${r.desde}<br>${r.hasta}</td>
                <td>D: ${r.pDepto}<br>R: ${r.pRRHH}</td>
                <td>${r.obs}</td>
            </tr>`;
        });
    }

    function filtrar() {
        const val = document.getElementById('buscador').value.toLowerCase();
        render(db.filter(i => i.dni.includes(val) || i.nombre.toLowerCase().includes(val)));
    }

    function importar(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type:'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            json.forEach(f => {
                db.push({
                    id: Date.now() + Math.random(),
                    estado: f.ESTADO || 'PENDIENTE',
                    nombre: (f.AGENTE || '').toUpperCase(),
                    dni: String(f.DNI || ''),
                    nivel: f.NIVEL || '',
                    funcion: (f.FUNCION || '').toUpperCase(),
                    agrupamiento: f.AGRUPAMIENTO || '',
                    organismo: f.ORGANISMO || 'APO',
                    desde: f.DESDE || '', hasta: f.HASTA || '',
                    pDepto: f.PRES_DEPTO || '', pRRHH: f.PRES_RRHH || '',
                    obs: (f.OBS || '').toUpperCase()
                });
            });
            guardar();
            alert("Importación exitosa");
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    function exportar() {
        let csv = "\uFEFFESTADO;ORGANISMO;AGENTE;DNI;NIVEL;FUNCION;DESDE;HASTA;OBS\n";
        db.forEach(r => { csv += `${r.estado};${r.organismo};${r.nombre};${r.dni};${r.nivel};${r.funcion};${r.desde};${r.hasta};${r.obs}\n`; });
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Reporte_APO.csv";
        link.click();
    }
</script>
</body>
</html>
