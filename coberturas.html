<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coberturas APO - V5 Import</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #003366; --secondary: #00509d; --accent: #00d1b2; --light: #f4f7f9; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--light); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 400px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; border-right: 4px solid var(--primary); }
        .sidebar-header { text-align: center; margin-bottom: 15px; background: var(--primary); color: white; padding: 15px; border-radius: 4px; text-transform: uppercase; font-size: 0.9rem; }
        
        .section { border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 12px; background: #fafafa; }
        .section-title { font-size: 0.75rem; font-weight: bold; color: var(--secondary); margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        
        label { display: block; font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; color: #555; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; outline: none; margin-bottom: 8px; }

        .btn-submit { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .btn-import { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.75rem; }

        .main-content { flex-grow: 1; padding: 25px; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
        .search-container { background: #eef2f7; padding: 15px; border-radius: 6px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #d1d9e4; }
        .search-input { flex-grow: 1; padding: 10px; border: 2px solid #003366; border-radius: 4px; font-size: 1rem; }

        .table-container { border: 1px solid #ddd; border-radius: 4px; overflow: auto; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 800px; }
        th { background: var(--primary); color: white; position: sticky; top: 0; padding: 12px; text-align: left; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header"><strong>COBERTURAS APO - V5</strong></div>
    
    <div class="section" style="background: #e8f5e9; border: 1px solid #c8e6c9;">
        <div class="section-title" style="color: #2e7d32;">Carga Masiva (Excel)</div>
        <label>Seleccione su archivo Excel:</label>
        <input type="file" id="excelInput" accept=".xlsx, .xls" style="font-size: 0.7rem;">
        <button type="button" class="btn-import" onclick="importarExcel()">📥 Importar desde Excel</button>
    </div>

    <form id="formCarga">
        <div class="section"><div class="section-title">Datos Manuales</div>
            <label>Estado</label><select id="estado"><option>PENDIENTE</option><option>AUTORIZADO</option><option>BAJA</option></select>
            <label>Apellido y Nombre</label><input type="text" id="nombre" required>
            <label>DNI</label><input type="number" id="dni" required>
            <label>Función</label><input type="text" id="funcion" required>
            <label>Organismo</label><select id="organismo"><option>APO</option><option>TAFI VIEJO</option><option>LULES</option><option>FAMAILLA</option></select>
            <label>Vigencia</label><input type="text" id="vigencia" placeholder="Desde - Hasta">
            <label>Observaciones</label><textarea id="obs" rows="2"></textarea>
        </div>
        <button type="submit" class="btn-submit">Registrar Individual</button>
    </form>
</div>

<div class="main-content">
    <div class="search-container">
        <strong>🔍 FILTRAR POR DNI:</strong>
        <input type="number" id="buscador" class="search-input" oninput="filtrar()">
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Estado</th><th>Organismo</th><th>Agente</th><th>DNI</th><th>Función</th><th>Vigencia</th><th>Observación</th>
                </tr>
            </thead>
            <tbody id="cuerpo"></tbody>
        </table>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('db_final_v5')) || [];
    render();

    // Función para IMPORTAR desde Excel
    function importarExcel() {
        const input = document.getElementById('excelInput');
        if (!input.files[0]) return alert("Por favor, seleccione un archivo.");

        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet);

            jsonData.forEach(fila => {
                db.push({
                    id: Date.now() + Math.random(),
                    estado: fila.ESTADO || 'PENDIENTE',
                    nombre: (fila.AGENTE || '').toUpperCase(),
                    dni: fila.DNI || '',
                    funcion: (fila.FUNCION || '').toUpperCase(),
                    organismo: fila.ORGANISMO || 'APO',
                    vigencia: fila.VIGENCIA || '',
                    obs: (fila.OBS || 'IMPORTADO').toUpperCase()
                });
            });

            localStorage.setItem('db_final_v5', JSON.stringify(db));
            render();
            alert("¡Carga masiva completada con éxito!");
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    document.getElementById('formCarga').addEventListener('submit', function(e) {
        e.preventDefault();
        db.push({
            id: Date.now(),
            estado: document.getElementById('estado').value,
            nombre: document.getElementById('nombre').value.toUpperCase(),
            dni: document.getElementById('dni').value,
            funcion: document.getElementById('funcion').value.toUpperCase(),
            organismo: document.getElementById('organismo').value,
            vigencia: document.getElementById('vigencia').value,
            obs: document.getElementById('obs').value.toUpperCase() || 'SIN OBS.'
        });
        localStorage.setItem('db_final_v5', JSON.stringify(db));
        render();
        this.reset();
    });

    function render(data = db) {
        const t = document.getElementById('cuerpo');
        t.innerHTML = "";
        [...data].reverse().forEach(r => {
            t.innerHTML += `<tr>
                <td><b>${r.estado}</b></td>
                <td>${r.organismo}</td>
                <td>${r.nombre}</td>
                <td>${r.dni}</td>
                <td>${r.funcion}</td>
                <td>${r.vigencia}</td>
                <td>${r.obs}</td>
            </tr>`;
        });
    }

    function filtrar() {
        const val = document.getElementById('buscador').value;
        render(db.filter(i => String(i.dni).includes(val)));
    }
</script>
</body>
</html>
