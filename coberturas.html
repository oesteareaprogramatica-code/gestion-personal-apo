<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Coberturas - APO</title>
    <style>
        :root { --primary: #003366; --accent: #00b1b2; --bg: #f0f4f7; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 0; }

        /* Barra Superior Original */
        .nav-header { background: var(--primary); color: white; padding: 12px 30px; display: flex; justify-content: space-between; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Tarjeta Blanca Central (Formato Origen) */
        .container { max-width: 1000px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-top: 0; font-size: 22px; }

        /* Formulario Limpio */
        .grid-form { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .form-item { display: flex; flex-direction: column; }
        .full { grid-column: span 3; }
        .half { grid-column: span 1; }

        label { font-weight: bold; margin-bottom: 5px; color: #444; font-size: 13px; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: #fcfcfc; }
        input:focus { border-color: var(--accent); outline: none; background: white; }

        /* Botones Originales */
        .btn-group { display: flex; gap: 10px; margin: 25px 0; }
        button { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-reg { background: var(--primary); color: white; }
        .btn-excel { background: #28a745; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Buscador */
        .search-box { background: #eef2f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .search-box input { flex-grow: 1; border: 2px solid var(--primary); }

        /* Tabla Estilo Original */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { background: var(--accent); color: white; padding: 12px; text-align: left; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        
        /* Colores de Estado V5 */
        .status-autorizado { border-left: 5px solid #28a745; background: #f0fff4; }
        .status-baja { border-left: 5px solid #dc3545; background: #fff5f5; }

        .footer { text-align: center; margin-top: 30px; font-size: 11px; color: #999; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="nav-header">
    <strong>APO - Gestión de Personal</strong>
    <span>SIPROSA - Tucumán</span>
</div>

<div class="container">
    <h2>Registro de Cobertura de Cargos</h2>
    
    <form id="formApo">
        <div class="grid-form">
            <div class="form-item">
                <label>ESTADO:</label>
                <select id="estado" style="font-weight:bold; color:var(--primary);">
                    <option value="PENDIENTE">⏳ PENDIENTE</option>
                    <option value="AUTORIZADO">✅ AUTORIZADO</option>
                    <option value="BAJA">❌ BAJA</option>
                </select>
            </div>
            <div class="form-item">
                <label>Nombre del Agente:</label>
                <input type="text" id="nombre" placeholder="Apellido y Nombre" required>
            </div>
            <div class="form-item">
                <label>DNI:</label>
                <input type="number" id="dni" required>
            </div>
            <div class="form-item">
                <label>Función / Cargo:</label>
                <input type="text" id="cargo" required>
            </div>
            <div class="form-item">
                <label>Vigencia (Desde - Hasta):</label>
                <input type="text" id="vigencia" placeholder="ej: 01/04 al 15/04">
            </div>
            <div class="form-item">
                <label>Efector (Organismo):</label>
                <select id="organismo">
                    <option>APO</option><option>TAFI DEL VALLE</option><option>LULES</option><option>FAMAILLA</option>
                </select>
            </div>
            <div class="form-item full">
                <label>Observaciones:</label>
                <textarea id="obs" rows="3" placeholder="Motivo del reemplazo, expediente..."></textarea>
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-reg">Registrar en Tabla</button>
            <button type="button" class="btn-excel" onclick="exportar()">Descargar Reporte Excel</button>
        </div>
    </form>

    <div class="search-box">
        <strong style="color:var(--primary)">🔍 BUSCAR DNI:</strong>
        <input type="text" id="busqueda" placeholder="Filtrar por documento..." oninput="filtrar()">
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Estado</th>
                    <th>Agente</th>
                    <th>DNI</th>
                    <th>Cargo</th>
                    <th>Vigencia</th>
                    <th>Observaciones</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>

    <div class="footer">
        Área Programática Oeste | Hospitales y CAPS | Departamento de Personal
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('db_apo_final')) || [];
    render();

    document.getElementById('formApo').addEventListener('submit', function(e) {
        e.preventDefault();
        const nuevo = {
            id: Date.now(),
            estado: document.getElementById('estado').value,
            nombre: document.getElementById('nombre').value.toUpperCase(),
            dni: document.getElementById('dni').value,
            cargo: document.getElementById('cargo').value.toUpperCase(),
            vigencia: document.getElementById('vigencia').value,
            obs: document.getElementById('obs').value.toUpperCase() || 'SIN OBS.'
        };
        db.push(nuevo);
        guardar();
        this.reset();
    });

    function guardar() {
        localStorage.setItem('db_apo_final', JSON.stringify(db));
        render();
    }

    function render(datos = db) {
        const t = document.getElementById('cuerpoTabla');
        t.innerHTML = "";
        [...datos].reverse().forEach(r => {
            let clase = r.estado === "AUTORIZADO" ? "status-autorizado" : (r.estado === "BAJA" ? "status-baja" : "");
            t.innerHTML += `<tr class="${clase}">
                <td><b>${r.estado}</b></td>
                <td>${r.nombre}</td>
                <td>${r.dni}</td>
                <td>${r.cargo}</td>
                <td>${r.vigencia}</td>
                <td>${r.obs}</td>
                <td><button onclick="borrar(${r.id})" style="background:none; border:none; cursor:pointer;">🗑️</button></td>
            </tr>`;
        });
    }

    function filtrar() {
        const val = document.getElementById('busqueda').value;
        render(db.filter(i => i.dni.includes(val) || i.nombre.includes(val.toUpperCase())));
    }

    function borrar(id) {
        if(confirm("¿Eliminar registro?")) {
            db = db.filter(i => i.id !== id);
            guardar();
        }
    }

    function exportar() {
        let csv = "\uFEFFESTADO;AGENTE;DNI;CARGO;VIGENCIA;OBSERVACIONES\n";
        db.forEach(r => { csv += `${r.estado};${r.nombre};${r.dni};${r.cargo};${r.vigencia};${r.obs}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Reporte_APO.csv";
        link.click();
    }
</script>

</body>
</html>
