<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Coberturas - APO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f7; margin: 0; padding: 0; }
        .header-bar { background-color: #003366; color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .container { max-width: 1100px; margin: 30px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #003366; border-bottom: 3px solid #00b1b2; padding-bottom: 10px; margin-top: 0; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; background: #f9f9f9; padding: 20px; border-radius: 8px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; color: #333; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .full-width { grid-column: 1 / -1; }
        .actions { display: flex; gap: 15px; margin-bottom: 30px; }
        button { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-reg { background-color: #003366; color: white; }
        .btn-reg:hover { background-color: #00509d; }
        .btn-excel { background-color: #28a745; color: white; }
        .btn-excel:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #00b1b2; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        .footer-text { text-align: center; margin-top: 40px; font-size: 12px; color: #888; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="header-bar">
    <strong>APO - Gestión de Personal</strong>
    <span>SIPROSA - Tucumán</span>
</div>

<div class="container">
    <h2>Registro de Cobertura de Cargos</h2>
    
    <div class="form-grid">
        <div class="form-group">
            <label>Nombre del Agente:</label>
            <input type="text" id="nombre" placeholder="Apellido y Nombre">
        </div>
        <div class="form-group">
            <label>DNI:</label>
            <input type="text" id="dni">
        </div>
        <div class="form-group">
            <label>Función / Cargo:</label>
            <input type="text" id="cargo">
        </div>
        <div class="form-group">
            <label>Vigencia:</label>
            <input type="text" id="vigencia" placeholder="Desde - Hasta">
        </div>
        <div class="form-group full-width">
            <label>Observaciones:</label>
            <textarea id="obs" rows="2" placeholder="Motivo del reemplazo, titular, etc."></textarea>
        </div>
    </div>

    <div class="actions">
        <button class="btn-reg" onclick="registrar()">Registrar en Tabla</button>
        <button class="btn-excel" onclick="descargarExcel()">Descargar Reporte Excel</button>
    </div>

    <table id="tablaDatos">
        <thead>
            <tr>
                <th>Fecha Carga</th>
                <th>Agente</th>
                <th>DNI</th>
                <th>Cargo</th>
                <th>Vigencia</th>
                <th>Observaciones</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>

    <div class="footer-text">
        Área Programática Oeste | Hospitales y CAPS | Departamento de Personal
    </div>
</div>

<script>
    // Al abrir la página, cargar lo que ya estaba guardado
    window.onload = function() {
        const datos = JSON.parse(localStorage.getItem('coberturas_apo') || '[]');
        datos.reverse().forEach(d => mostrarEnTabla(d));
    };

    function registrar() {
        const d = {
            fecha: new Date().toLocaleDateString(),
            nombre: document.getElementById('nombre').value,
            dni: document.getElementById('dni').value,
            cargo: document.getElementById('cargo').value,
            vigencia: document.getElementById('vigencia').value,
            obs: document.getElementById('obs').value
        };

        if(!d.nombre) return alert("Por favor, ingrese al menos el nombre.");

        // Guardar en memoria local
        const lista = JSON.parse(localStorage.getItem('coberturas_apo') || '[]');
        lista.push(d);
        localStorage.setItem('coberturas_apo', JSON.stringify(lista));

        mostrarEnTabla(d, true);
        
        // Limpiar campos
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
    }

    function mostrarEnTabla(d, alInicio = false) {
        const tabla = document.getElementById('cuerpoTabla');
        const fila = tabla.insertRow(alInicio ? 0 : -1);
        fila.innerHTML = `<td>${d.fecha}</td><td>${d.nombre}</td><td>${d.dni}</td><td>${d.cargo}</td><td>${d.vigencia}</td><td>${d.obs}</td>`;
    }

    function descargarExcel() {
        const tabla = document.getElementById("tablaDatos");
        const libro = XLSX.utils.table_to_book(tabla, {sheet: "Coberturas"});
        XLSX.writeFile(libro, "Coberturas_APO_" + new Date().toLocaleDateString() + ".xlsx");
    }
</script>

</body>
</html>
