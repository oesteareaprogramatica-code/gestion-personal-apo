<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Coberturas - APO</title>
    <style>
        :root { --primary: #003366; --accent: #00b1b2; --bg: #f0f4f7; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 0; }

        /* Barra Azul Superior Fina */
        .nav-header { background: var(--primary); color: white; padding: 12px 30px; display: flex; justify-content: space-between; font-size: 14px; }

        /* Tarjeta Blanca Centrada (Diseño Original) */
        .main-card { 
            max-width: 900px; 
            margin: 50px auto; 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-top: 0; font-size: 22px; }

        /* Formulario Estilo Original */
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 25px; }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 3; }

        label { font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; background: #fafafa; }
        input:focus { border-color: var(--accent); outline: none; background: white; }

        /* Botones Originales */
        .btn-container { display: flex; gap: 15px; margin: 30px 0; }
        button { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .btn-blue { background-color: var(--primary); color: white; }
        .btn-green { background-color: #28a745; color: white; }
        button:hover { opacity: 0.9; }

        /* Tabla Original */
        .table-area { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background-color: var(--accent); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; color: #444; }

        .footer { text-align: center; margin-top: 40px; font-size: 11px; color: #aaa; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="nav-header">
    <strong>APO - Gestión de Personal</strong>
    <span>SIPROSA - Tucumán</span>
</div>

<div class="main-card">
    <h2>Registro de Cobertura de Cargos</h2>
    
    <form id="regForm">
        <div class="form-grid">
            <div class="form-group">
                <label>Nombre del Agente:</label>
                <input type="text" id="nombre" placeholder="Apellido y Nombre" required>
            </div>
            <div class="form-group">
                <label>DNI:</label>
                <input type="text" id="dni" required>
            </div>
            <div class="form-group">
                <label>Función / Cargo:</label>
                <input type="text" id="cargo" required>
            </div>
            <div class="form-group full-width">
                <label>Vigencia:</label>
                <input type="text" id="vigencia" placeholder="Desde - Hasta">
            </div>
            <div class="form-group full-width">
                <label>Observaciones:</label>
                <textarea id="obs" rows="3" placeholder="Motivo del reemplazo, titular, etc."></textarea>
            </div>
        </div>

        <div class="btn-container">
            <button type="submit" class="btn-blue">Registrar en Tabla</button>
            <button type="button" class="btn-green" onclick="descargarExcel()">Descargar Reporte Excel</button>
        </div>
    </form>

    <div class="table-area">
        <table>
            <thead>
                <tr>
                    <th>Fecha Carga</th>
                    <th>Agente</th>
                    <th>DNI</th>
                    <th>Cargo</th>
                    <th>Vigencia</th>
                    <th>Observaciones</th>
                </tr>
            </thead>
            <tbody id="tablaBody"></tbody>
        </table>
    </div>

    <div class="footer">
        Área Programática Oeste | Hospitales y CAPS | Departamento de Personal
    </div>
</div>

<script>
    let datos = JSON.parse(localStorage.getItem('apo_db_orig')) || [];
    mostrarTabla();

    document.getElementById('regForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const nuevo = {
            fecha: new Date().toLocaleDateString(),
            nombre: document.getElementById('nombre').value.toUpperCase(),
            dni: document.getElementById('dni').value,
            cargo: document.getElementById('cargo').value.toUpperCase(),
            vigencia: document.getElementById('vigencia').value,
            obs: document.getElementById('obs').value.toUpperCase() || 'SIN OBSERVACIONES'
        };
        datos.push(nuevo);
        localStorage.setItem('apo_db_orig', JSON.stringify(datos));
        this.reset();
        mostrarTabla();
    });

    function mostrarTabla() {
        const body = document.getElementById('tablaBody');
        body.innerHTML = "";
        [...datos].reverse().forEach(r => {
            body.innerHTML += `<tr>
                <td>${r.fecha}</td>
                <td><b>${r.nombre}</b></td>
                <td>${r.dni}</td>
                <td>${r.cargo}</td>
                <td>${r.vigencia}</td>
                <td>${r.obs}</td>
            </tr>`;
        });
    }

    function descargarExcel() {
        let csv = "\uFEFFFECHA;AGENTE;DNI;CARGO;VIGENCIA;OBSERVACIONES\n";
        datos.forEach(r => {
            csv += `${r.fecha};${r.nombre};${r.dni};${r.cargo};${r.vigencia};${r.obs}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Reporte_Coberturas.csv";
        link.click();
    }
</script>

</body>
</html>
