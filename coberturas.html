<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobertura de Servicio APO - Gestión y Análisis</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #003366; --secondary: #00509d; --accent: #00d1b2; --light: #f4f7f9; --warning: #ffc107; --danger: #dc3545; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 450px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; border-right: 4px solid var(--primary); flex-shrink: 0; }
        .sidebar-header { text-align: center; margin-bottom: 15px; background: var(--primary); color: white; padding: 10px; border-radius: 4px; }
        
        .section { border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 12px; background: #fafafa; }
        .section-title { font-size: 0.7rem; font-weight: bold; color: var(--secondary); margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid #ddd; }
        
        .form-group { margin-bottom: 8px; }
        label { display: block; font-size: 0.65rem; font-weight: bold; margin-bottom: 2px; color: #444; }
        input, select, textarea { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; outline: none; }
        
        .btn-save { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .btn-import { background: #28a745; color: white; margin-top: 8px; }

        .main-content { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; min-width: 0; }
        .search-container { background: #e1e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-left: 5px solid var(--primary); }
        .search-input { flex-grow: 1; padding: 10px; border: 2px solid var(--primary); border-radius: 4px; font-size: 1rem; font-weight: bold; }
        
        .table-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: auto; flex-grow: 1; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { background: var(--primary); color: white; position: sticky; top: 0; padding: 10px; text-align: left; z-index: 10; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        
        .status-autorizado { background-color: #d4edda !important; color: #155724; }
        .status-baja { background-color: #f8d7da !important; color: #721c24; }
        .status-pendiente { background-color: #fff3cd !important; color: #856404; }

        .btn-action { padding: 4px 8px; border: none; border-radius: 3px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .btn-edit { background: var(--warning); margin-right: 5px; }
        .btn-delete { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header"><h2>GESTIÓN RRHH - APO</h2></div>
    <form id="coberturaForm">
        <input type="hidden" id="editIndex" value="-1">
        
        <div class="section">
            <div class="section-title">Control de Estado</div>
            <select id="estado">
                <option value="PENDIENTE">⏳ PENDIENTE</option>
                <option value="AUTORIZADO">✅ AUTORIZADO</option>
                <option value="BAJA">❌ BAJA</option>
            </select>
        </div>

        <div class="section">
            <div class="section-title">Datos del Agente</div>
            <div class="form-group"><label>NOMBRE COMPLETO</label><input type="text" id="nombre" required></div>
            <div class="form-group"><label>DNI</label><input type="number" id="dni" required></div>
            <div class="form-group"><label>FUNCIÓN</label><input type="text" id="funcion"></div>
            <div class="form-group">
                <label>AGRUPAMIENTO</label>
                <select id="agrupamiento">
                    <option value="ASISTENCIAL">ASISTENCIAL</option>
                    <option value="NO ASISTENCIAL">NO ASISTENCIAL</option>
                </select>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Ubicación y Plazos</div>
            <div class="form-group"><label>ORGANISMO</label><input type="text" id="organismo" value="APO"></div>
            <div class="form-group"><label>DESDE</label><input type="date" id="desde"></div>
            <div class="form-group"><label>HASTA</label><input type="date" id="hasta"></div>
        </div>

        <button type="submit" id="btnGuardar" class="btn-save">GUARDAR REGISTRO</button>
        <button type="button" class="btn-save btn-import" onclick="document.getElementById('importExcel').click()">📥 IMPORTAR EXCEL</button>
        <input type="file" id="importExcel" accept=".xlsx, .xls" style="display:none;" onchange="importar(this)">
    </form>
</div>

<div class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 style="color:var(--primary); margin:0;">Registro de Coberturas de Servicio</h2>
        <button onclick="exportarExcelConAnalisis()" style="background:#1f7244; color:white; padding:10px 20px; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">📊 DESCARGAR EXCEL CON ANÁLISIS</button>
    </div>

    <div class="search-container">
        <input type="text" id="inputBusqueda" class="search-input" placeholder="🔍 Buscar por Nombre o DNI..." oninput="filtrar()">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ACCIONES</th><th>ESTADO</th><th>ORGANISMO</th><th>DNI / AGENTE</th><th>FUNCIÓN / AGRUP.</th><th>VIGENCIA</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    let baseDatos = JSON.parse(localStorage.getItem('db_apo_final')) || [];
    render(baseDatos);

    document.getElementById('coberturaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const index = document.getElementById('editIndex').value;
        const nuevo = {
            estado: document.getElementById('estado').value,
            nombre: document.getElementById('nombre').value.toUpperCase(),
            dni: document.getElementById('dni').value,
            funcion: document.getElementById('funcion').value.toUpperCase(),
            agrupamiento: document.getElementById('agrupamiento').value,
            organismo: document.getElementById('organismo').value,
            desde: document.getElementById('desde').value || '---',
            hasta: document.getElementById('hasta').value || '---'
        };

        if (index === "-1") {
            baseDatos.push(nuevo);
        } else {
            baseDatos[index] = nuevo;
            document.getElementById('editIndex').value = "-1";
            document.getElementById('btnGuardar').innerText = "GUARDAR REGISTRO";
        }
        
        guardarYRefrescar();
        this.reset();
    });

    function guardarYRefrescar() {
        localStorage.setItem('db_apo_final', JSON.stringify(baseDatos));
        render(baseDatos);
    }

    function render(datos) {
        const t = document.getElementById('cuerpoTabla');
        t.innerHTML = "";
        datos.forEach((r, i) => {
            let clase = r.estado === "AUTORIZADO" ? "status-autorizado" : (r.estado === "BAJA" ? "status-baja" : "status-pendiente");
            t.innerHTML += `<tr class="${clase}">
                <td>
                    <button class="btn-action btn-edit" onclick="editar(${i})">✏️</button>
                    <button class="btn-action btn-delete" onclick="eliminar(${i})">🗑️</button>
                </td>
                <td><b>${r.estado}</b></td>
                <td>${r.organismo}</td>
                <td>${r.dni}<br><b>${r.nombre}</b></td>
                <td>${r.funcion}<br><small>${r.agrupamiento}</small></td>
                <td>${r.desde} / ${r.hasta}</td>
            </tr>`;
        });
    }

    function filtrar() {
        const b = document.getElementById('inputBusqueda').value.toUpperCase();
        render(baseDatos.filter(a => String(a.dni).includes(b) || a.nombre.includes(b)));
    }

    function eliminar(i) {
        if(confirm("¿Eliminar este registro?")) {
            baseDatos.splice(i, 1);
            guardarYRefrescar();
        }
    }

    function editar(i) {
        const r = baseDatos[i];
        document.getElementById('estado').value = r.estado;
        document.getElementById('nombre').value = r.nombre;
        document.getElementById('dni').value = r.dni;
        document.getElementById('funcion').value = r.funcion;
        document.getElementById('agrupamiento').value = r.agrupamiento;
        document.getElementById('organismo').value = r.organismo;
        document.getElementById('editIndex').value = i;
        document.getElementById('btnGuardar').innerText = "ACTUALIZAR DATOS";
    }

    function importar(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            raw.forEach(f => {
                baseDatos.push({
                    estado: (f.ESTADO || 'PENDIENTE').toUpperCase(),
                    nombre: (f.AGENTE || f.NOMBRE || 'S/N').toUpperCase(),
                    dni: f.DNI || '0',
                    funcion: (f.FUNCION || '-').toUpperCase(),
                    agrupamiento: (f.AGRUPAMIENTO || 'ASISTENCIAL').toUpperCase(),
                    organismo: f.ORGANISMO || 'APO',
                    desde: f.DESDE || '---',
                    hasta: f.HASTA || '---'
                });
            });
            guardarYRefrescar();
            alert("Excel importado con éxito.");
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    function exportarExcelConAnalisis() {
        if (baseDatos.length === 0) return alert("No hay datos");

        // 1. Datos para la hoja de Listado
        const ws1_data = baseDatos.map(r => ({
            "ESTADO": r.estado,
            "AGENTE": r.nombre,
            "DNI": r.dni,
            "FUNCIÓN": r.funcion,
            "AGRUPAMIENTO": r.agrupamiento,
            "ORGANISMO": r.organismo,
            "DESDE": r.desde,
            "HASTA": r.hasta
        }));

        // 2. Datos para la hoja de ANÁLISIS
        let s = { aut: 0, pend: 0, baj: 0, asi: 0, noa: 0 };
        baseDatos.forEach(r => {
            if(r.estado === "AUTORIZADO") s.aut++;
            if(r.estado === "PENDIENTE") s.pend++;
            if(r.estado === "BAJA") s.baj++;
            if(r.agrupamiento === "ASISTENCIAL") s.asi++;
            if(r.agrupamiento === "NO ASISTENCIAL") s.noa++;
        });

        const ws2_data = [
            {"INDICADOR": "TOTAL GENERAL", "CANTIDAD": baseDatos.length},
            {"INDICADOR": "AUTORIZADOS (✅)", "CANTIDAD": s.aut},
            {"INDICADOR": "PENDIENTES (⏳)", "CANTIDAD": s.pend},
            {"INDICADOR": "BAJAS (❌)", "CANTIDAD": s.baj},
            {"INDICADOR": "PERSONAL ASISTENCIAL", "CANTIDAD": s.asi},
            {"INDICADOR": "PERSONAL NO ASISTENCIAL", "CANTIDAD": s.noa}
        ];

        // 3. Crear el archivo Excel (LIBRO)
        const wb = XLSX.utils.book_new();
        const ws1 = XLSX.utils.json_to_sheet(ws1_data);
        const ws2 = XLSX.utils.json_to_sheet(ws2_data);

        XLSX.utils.book_append_sheet(wb, ws1, "Listado de Coberturas");
        XLSX.utils.book_append_sheet(wb, ws2, "ANÁLISIS ESTADÍSTICO");

        XLSX.writeFile(wb, "Reporte_RRHH_APO.xlsx");
    }
</script>
</body>
</html>
