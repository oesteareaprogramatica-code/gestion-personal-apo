<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobertura de Servicio APO - Gestión Integral</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #003366; --secondary: #00509d; --accent: #00d1b2; --light: #f4f7f9; --warning: #ffc107; --danger: #dc3545; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--light); margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* PANEL IZQUIERDO - FORMULARIO COMPLETO */
        .sidebar { width: 450px; min-width: 450px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; border-right: 4px solid var(--primary); }
        .sidebar-header { text-align: center; margin-bottom: 15px; background: var(--primary); color: white; padding: 10px; border-radius: 4px; }
        
        .section { border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 12px; background: #fafafa; }
        .section-title { font-size: 0.7rem; font-weight: bold; color: var(--secondary); margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid #ddd; }
        
        .form-group { margin-bottom: 8px; }
        label { display: block; font-size: 0.65rem; font-weight: bold; margin-bottom: 2px; color: #444; }
        input, select, textarea { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; outline: none; }
        textarea { height: 50px; resize: none; }
        
        .btn-save { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }

        /* PANEL DERECHO - TABLA Y BUSQUEDA */
        .main-content { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; min-width: 0; }
        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .search-container { background: #e1e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-left: 5px solid var(--primary); }
        .search-input { flex-grow: 1; padding: 10px; border: 2px solid var(--primary); border-radius: 4px; font-size: 1rem; font-weight: bold; }
        
        .table-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: auto; flex-grow: 1; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th { background: var(--primary); color: white; position: sticky; top: 0; padding: 10px; text-align: left; z-index: 10; }
        td { padding: 8px; border-bottom: 1px solid #eee; vertical-align: top; }
        
        .status-autorizado { background-color: #d4edda !important; }
        .status-baja { background-color: #f8d7da !important; }
        .status-pendiente { background-color: #fff3cd !important; }

        .btn-action { padding: 4px 8px; border: none; border-radius: 3px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .btn-edit { background: var(--warning); margin-right: 5px; }
        .btn-delete { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header"><h2>GESTIÓN RRHH - APO</h2></div>
    <form id="coberturaForm">
        <input type="hidden" id="editIndex" value="-1">
        
        <div class="section">
            <div class="section-title">Control de Estado</div>
            <select id="estado">
                <option value="PENDIENTE">⏳ PENDIENTE</option>
                <option value="AUTORIZADO">✅ AUTORIZADO</option>
                <option value="BAJA">❌ BAJA</option>
            </select>
        </div>

        <div class="section">
            <div class="section-title">Datos del Agente</div>
            <div class="form-group"><label>APELLIDO Y NOMBRE</label><input type="text" id="nombre" required></div>
            <div style="display: flex; gap: 8px;">
                <div class="form-group" style="flex: 2;"><label>DNI</label><input type="number" id="dni" required></div>
                <div class="form-group" style="flex: 1;"><label>NIVEL</label><input type="text" id="nivel"></div>
            </div>
            <div class="form-group"><label>FUNCIÓN</label><input type="text" id="funcion"></div>
            <div class="form-group">
                <label>AGRUPAMIENTO</label>
                <select id="agrupamiento">
                    <option value="ASISTENCIAL">ASISTENCIAL</option>
                    <option value="NO ASISTENCIAL">NO ASISTENCIAL</option>
                </select>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Organismo y Fechas</div>
            <div class="form-group">
                <label>ORGANISMO (EFECTOR)</label>
                <select id="organismo">
                    <option value="APO">APO</option>
                    <option value="AO VALLES CALCHAQUIES">AO VALLES CALCHAQUIES</option>
                    <option value="TAFI DEL VALLE">TAFI DEL VALLE</option>
                    <option value="TAFI VIEJO">TAFI VIEJO</option>
                    <option value="TRANCAS">TRANCAS</option>
                    <option value="LULES">LULES</option>
                    <option value="FAMAILLA">FAMAILLA</option>
                </select>
            </div>
            <div style="display: flex; gap: 8px;">
                <div class="form-group"><label>DESDE</label><input type="date" id="desde"></div>
                <div class="form-group"><label>HASTA</label><input type="date" id="hasta"></div>
            </div>
            <div style="display: flex; gap: 8px;">
                <div class="form-group"><label>PRES. DEPTO</label><input type="date" id="pres_oficina"></div>
                <div class="form-group"><label>PRES. RRHH</label><input type="date" id="pres_rrhh"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Observaciones</div>
            <textarea id="observacion"></textarea>
        </div>

        <button type="submit" id="btnGuardar" class="btn-save">GUARDAR REGISTRO</button>
    </form>
</div>

<div class="main-content">
    <div class="header-main">
        <h2 style="color:var(--primary); margin:0;">Registro de Coberturas Provisorias</h2>
        <button onclick="exportarExcelFinal()" style="background:#1f7244; color:white; padding:10px 20px; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">📊 DESCARGAR EXCEL + ANÁLISIS</button>
    </div>

    <div class="search-container">
        <input type="text" id="inputBusqueda" class="search-input" placeholder="🔍 Buscar por Nombre o DNI..." oninput="filtrar()">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ACCIONES</th><th>ESTADO</th><th>ORGANISMO</th><th>AGENTE / DNI / NIVEL</th><th>FUNCIÓN / AGRUP.</th><th>VIGENCIA</th><th>OBSERVACIÓN</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    let baseDatos = JSON.parse(localStorage.getItem('db_apo_v5_full')) || [];
    render(baseDatos);

    document.getElementById('coberturaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const index = document.getElementById('editIndex').value;
        const registro = {
            id: Date.now(),
            estado: document.getElementById('estado').value,
            nombre: document.getElementById('nombre').value.toUpperCase(),
            dni: document.getElementById('dni').value,
            nivel: document.getElementById('nivel').value.toUpperCase(),
            funcion: document.getElementById('funcion').value.toUpperCase(),
            agrupamiento: document.getElementById('agrupamiento').value,
            organismo: document.getElementById('organismo').value,
            desde: document.getElementById('desde').value || '---',
            hasta: document.getElementById('hasta').value || '---',
            pres_oficina: document.getElementById('pres_oficina').value || '---',
            pres_rrhh: document.getElementById('pres_rrhh').value || '---',
            observacion: document.getElementById('observacion').value.toUpperCase() || '---'
        };

        if (index === "-1") { baseDatos.push(registro); } 
        else { baseDatos[index] = registro; document.getElementById('editIndex').value = "-1"; }
        
        localStorage.setItem('db_apo_v5_full', JSON.stringify(baseDatos));
        render(baseDatos);
        this.reset();
        document.getElementById('btnGuardar').innerText = "GUARDAR REGISTRO";
    });

    function render(datos) {
        const t = document.getElementById('cuerpoTabla');
        t.innerHTML = "";
        [...datos].reverse().forEach((r) => {
            let clase = r.estado === "AUTORIZADO" ? "status-autorizado" : (r.estado === "BAJA" ? "status-baja" : "status-pendiente");
            t.innerHTML += `<tr class="${clase}">
                <td>
                    <button class="btn-action btn-edit" onclick="editar(${baseDatos.indexOf(r)})">✏️</button>
                    <button class="btn-action btn-delete" onclick="eliminar(${baseDatos.indexOf(r)})">🗑️</button>
                </td>
                <td><b>${r.estado}</b></td>
                <td>${r.organismo}</td>
                <td><b>${r.nombre}</b><br>DNI: ${r.dni} | NV: ${r.nivel}</td>
                <td>${r.funcion}<br><small>${r.agrupamiento}</small></td>
                <td>${r.desde} al ${r.hasta}</td>
                <td title="${r.observacion}">${r.observacion.substring(0,20)}...</td>
            </tr>`;
        });
    }

    function filtrar() {
        const b = document.getElementById('inputBusqueda').value.toUpperCase();
        render(baseDatos.filter(a => a.dni.includes(b) || a.nombre.includes(b)));
    }

    function editar(i) {
        const r = baseDatos[i];
        document.getElementById('editIndex').value = i;
        document.getElementById('estado').value = r.estado;
        document.getElementById('nombre').value = r.nombre;
        document.getElementById('dni').value = r.dni;
        document.getElementById('nivel').value = r.nivel;
        document.getElementById('funcion').value = r.funcion;
        document.getElementById('agrupamiento').value = r.agrupamiento;
        document.getElementById('organismo').value = r.organismo;
        document.getElementById('desde').value = r.desde === '---' ? '' : r.desde;
        document.getElementById('hasta').value = r.hasta === '---' ? '' : r.hasta;
        document.getElementById('pres_oficina').value = r.pres_oficina === '---' ? '' : r.pres_oficina;
        document.getElementById('pres_rrhh').value = r.pres_rrhh === '---' ? '' : r.pres_rrhh;
        document.getElementById('observacion').value = r.observacion === '---' ? '' : r.observacion;
        document.getElementById('btnGuardar').innerText = "ACTUALIZAR DATOS";
    }

    function eliminar(i) {
        if(confirm("¿Eliminar registro?")) {
            baseDatos.splice(i, 1);
            localStorage.setItem('db_apo_v5_full', JSON.stringify(baseDatos));
            render(baseDatos);
        }
    }

    function exportarExcelFinal() {
        if (baseDatos.length === 0) return alert("No hay datos");
        const ws1_data = baseDatos.map(r => ({
            "ESTADO": r.estado, "ORGANISMO": r.organismo, "AGENTE": r.nombre, "DNI": r.dni,
            "NIVEL": r.nivel, "FUNCIÓN": r.funcion, "AGRUPAMIENTO": r.agrupamiento,
            "DESDE": r.desde, "HASTA": r.hasta, "PRES_DEPTO": r.pres_oficina, "PRES_RRHH": r.pres_rrhh, "OBSERVACIÓN": r.observacion
        }));
        let s = { aut: 0, pend: 0, baj: 0, asi: 0, noa: 0 };
        baseDatos.forEach(r => {
            if(r.estado === "AUTORIZADO") s.aut++;
            if(r.estado === "PENDIENTE") s.pend++;
            if(r.estado === "BAJA") s.baj++;
            if(r.agrupamiento === "ASISTENCIAL") s.asi++;
            if(r.agrupamiento === "NO ASISTENCIAL") s.noa++;
        });
        const ws2_data = [
            {"ANÁLISIS": "TOTAL REGISTROS", "CANTIDAD": baseDatos.length},
            {"ANÁLISIS": "AUTORIZADOS", "CANTIDAD": s.aut},
            {"ANÁLISIS": "PENDIENTES", "CANTIDAD": s.pend},
            {"ANÁLISIS": "BAJAS", "CANTIDAD": s.baj},
            {"ANÁLISIS": "PERSONAL ASISTENCIAL", "CANTIDAD": s.asi},
            {"ANÁLISIS": "PERSONAL NO ASISTENCIAL", "CANTIDAD": s.noa}
        ];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ws1_data), "Listado");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ws2_data), "Estadísticas");
        XLSX.writeFile(wb, "Reporte_RRHH_APO.xlsx");
    }
</script>
</body>
</html>
