<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coberturas APO - V5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #003366; --secondary: #00509d; --accent: #00d1b2; --light: #f4f7f9; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--light); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 400px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; border-right: 4px solid var(--primary); }
        .sidebar-header { text-align: center; margin-bottom: 15px; background: var(--primary); color: white; padding: 15px; border-radius: 4px; text-transform: uppercase; font-size: 0.9rem; }
        
        .section { border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 12px; background: #fafafa; }
        .section-title { font-size: 0.75rem; font-weight: bold; color: var(--secondary); margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        
        label { display: block; font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; color: #555; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; outline: none; margin-bottom: 8px; }

        .btn-submit { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-import { width: 100%; padding: 8px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; margin-top: 10px; }

        .main-content { flex-grow: 1; padding: 25px; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
        .search-container { background: #eef2f7; padding: 15px; border-radius: 6px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #d1d9e4; }
        .search-input { flex-grow: 1; padding: 10px; border: 2px solid #003366; border-radius: 4px; font-size: 1rem; }

        .table-container { border: 1px solid #ddd; border-radius: 4px; overflow: auto; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 1000px; }
        th { background: var(--primary); color: white; position: sticky; top: 0; padding: 12px; text-align: left; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header"><strong>COBERTURAS APO - V5</strong></div>
    
    <form id="formCarga">
        <div class="section" style="background: #fff9e6;">
            <div class="section-title">Control de Estado</div>
            <select id="estado"><option>PENDIENTE</option><option>AUTORIZADO</option><option>BAJA</option></select>
        </div>

        <div class="section">
            <div class="section-title">Datos del Agente</div>
            <label>Apellido y Nombre</label><input type="text" id="nombre" required>
            <label>DNI</label><input type="number" id="dni" required>
            <label>Nivel</label><select id="nivel"><option>A1</option><option>A2</option><option>B1</option><option>C</option></select>
            <label>Función</label><input type="text" id="funcion" required>
            <label>Agrupamiento</label><select id="agrupamiento"><option>ASISTENCIAL</option><option>NO ASISTENCIAL</option></select>
        </div>

        <div class="section">
            <div class="section-title">Organismo (Efector)</div>
            <select id="organismo">
                <option>APO</option>
                <option>HOSP. TAFI DEL VALLE</option>
                <option>HOSP. LULES</option>
                <option>HOSP. FAMAILLA</option>
                <option>ÁREA OPERATIVA LULES</option>
                <option>ÁREA OPERATIVA FAMAILLA</option>
                <option>ÁREA OPERATIVA TAFI DEL VALLE</option>
            </select>
        </div>

        <div class="section">
            <div class="section-title">Vigencia y Presentación</div>
            <label>Desde</label><input type="date" id="desde">
            <label>Hasta</label><input type="date" id="hasta">
            <label>Pres. Depto</label><input type="date" id="pres_depto">
            <label>Pres. RRHH</label><input type="date" id="pres_rrhh">
        </div>

        <div class="section">
            <div class="section-title">Observaciones</div>
            <textarea id="obs" rows="3"></textarea>
        </div>

        <button type="submit" class="btn-submit">Registrar Cobertura</button>
        <input type="file" id="inputExcel" accept=".xlsx, .xls" style="display:none;" onchange="procesarExcel(this)">
        <button type="button" class="btn-import" onclick="document.getElementById('inputExcel').click()">📥 Importar desde Excel</button>
    </form>
</div>

<div class="main-content">
    <div class="search-container">
        <strong>🔍 BUSCAR DNI:</strong>
        <input type="number" id="buscador" class="search-input" oninput="filtrar()">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Estado</th>
                    <th>Organismo</th>
                    <th>Agente / DNI</th>
                    <th>Cargo / Nivel</th>
                    <th>Desde / Hasta</th>
                    <th>Presentación</th>
                    <th>Observación</th>
                </tr>
            </thead>
            <tbody id="cuerpo"></tbody>
        </table>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('db_final_v5')) || [];
    render();

    document.getElementById('formCarga').addEventListener('submit', function(e) {
        e.preventDefault();
        db.push({
            id: Date.now(),
            estado: document.getElementById('estado').value,
            nombre: document.getElementById('nombre').value.toUpperCase(),
            dni: document.getElementById('dni').value,
            nivel: document.getElementById('nivel').value,
            funcion: document.getElementById('funcion').value.toUpperCase(),
            agrupamiento: document.getElementById('agrupamiento').value,
            organismo: document.getElementById('organismo').value,
            desde: document.getElementById('desde').value || '--',
            hasta: document.getElementById('hasta').value || '--',
            pDepto: document.getElementById('pres_depto').value || '--',
            pRRHH: document.getElementById('pres_rrhh').value || '--',
            obs: document.getElementById('obs').value.toUpperCase() || 'SIN OBS.'
        });
        localStorage.setItem('db_final_v5', JSON.stringify(db));
        render();
        this.reset();
    });

    function procesarExcel(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet);
            jsonData.forEach(fila => {
                db.push({
                    id: Date.now() + Math.random(),
                    estado: fila.ESTADO || 'PENDIENTE',
                    nombre: (fila.AGENTE || '').toUpperCase(),
                    dni: String(fila.DNI || ''),
                    nivel: fila.NIVEL || '',
                    funcion: (fila.FUNCION || '').toUpperCase(),
                    agrupamiento: fila.AGRUPAMIENTO || '',
                    organismo: fila.ORGANISMO || 'APO',
                    desde: fila.DESDE || '',
                    hasta: fila.HASTA || '',
                    pDepto: fila.PRES_DEPTO || '',
                    pRRHH: fila.PRES_RRHH || '',
                    obs: (fila.OBS || '').toUpperCase()
                });
            });
            localStorage.setItem('db_final_v5', JSON.stringify(db));
            render();
            alert("¡Importación exitosa!");
            input.value = ""; 
        };
        reader.readAsArrayBuffer(file);
    }

    function render(data = db) {
        const t = document.getElementById('cuerpo');
        t.innerHTML = "";
        [...data].reverse().forEach(r => {
            t.innerHTML += `<tr>
                <td><b>${r.estado}</b></td>
                <td>${r.organismo}</td>
                <td>${r.nombre}<br><small>${r.dni}</small></td>
                <td>${r.funcion}<br><small>${r.nivel} - ${r.agrupamiento}</small></td>
                <td>${r.desde}<br>${r.hasta}</td>
                <td>D:${r.pDepto}<br>R:${r.pRRHH}</td>
                <td>${r.obs}</td>
            </tr>`;
        });
    }

    function filtrar() {
        const val = document.getElementById('buscador').value;
        render(db.filter(i => String(i.dni).includes(val)));
    }
</script>
</body>
</html>
