<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Coberturas - APO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #003366; border-bottom: 3px solid #00b1b2; padding-bottom: 10px; margin-top: 0; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; color: #444; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .full-width { grid-column: span 2; }
        .buttons { margin-top: 10px; display: flex; gap: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background-color: #003366; color: white; }
        .btn-save:hover { background-color: #00509d; }
        .btn-excel { background-color: #28a745; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; font-size: 14px; }
        th { background-color: #00b1b2; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f1f1f1; }
        .footer { margin-top: 30px; font-size: 12px; color: #777; text-align: center; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Cobertura de Cargos (F1, F2, F23)</h2>
    
    <div class="form-grid">
        <div class="form-group">
            <label>Nombre del Agente:</label>
            <input type="text" id="nombre" placeholder="Apellido y Nombre">
        </div>
        <div class="form-group">
            <label>DNI:</label>
            <input type="text" id="dni">
        </div>
        <div class="form-group">
            <label>Función / Cargo:</label>
            <input type="text" id="cargo">
        </div>
        <div class="form-group">
            <label>Vigencia (Desde - Hasta):</label>
            <input type="text" id="vigencia" placeholder="ej: 01/04 al 15/04">
        </div>
        <div class="form-group full-width">
            <label>Observaciones (Reemplazo de..., Motivo):</label>
            <textarea id="obs" rows="2"></textarea>
        </div>
    </div>

    <div class="buttons">
        <button class="btn-save" onclick="agregarFila()">Registrar y Guardar</button>
        <button class="btn-excel" onclick="exportarExcel()">Descargar Excel para Compartir</button>
    </div>

    <table id="tablaCoberturas">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Nombre</th>
                <th>DNI</th>
                <th>Cargo</th>
                <th>Vigencia</th>
                <th>Observaciones</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>

    <div class="footer">
        Área Programática Oeste - SIPROSA Tucumán | Gestión de Personal
    </div>
</div>

<script>
    // Cargar datos guardados al abrir
    window.onload = function() {
        const guardados = JSON.parse(localStorage.getItem('datosCobertura') || '[]');
        guardados.forEach(dato => insertarEnTabla(dato));
    };

    function agregarFila() {
        const dato = {
            fecha: new Date().toLocaleDateString(),
            nombre: document.getElementById('nombre').value,
            dni: document.getElementById('dni').value,
            cargo: document.getElementById('cargo').value,
            vigencia: document.getElementById('vigencia').value,
            obs: document.getElementById('obs').value
        };

        if(!dato.nombre) return alert("Por favor, pon un nombre");

        // Guardar en la "memoria" del navegador
        const guardados = JSON.parse(localStorage.getItem('datosCobertura') || '[]');
        guardados.push(dato);
        localStorage.setItem('datosCobertura', JSON.stringify(guardados));

        insertarEnTabla(dato);
        
        // Limpiar campos
        document.querySelectorAll('input, textarea').forEach(i => i.value = '');
    }

    function insertarEnTabla(dato) {
        const tabla = document.getElementById('cuerpoTabla');
        const fila = tabla.insertRow(0);
        fila.innerHTML = `<td>${dato.fecha}</td><td>${dato.nombre}</td><td>${dato.dni}</td><td>${dato.cargo}</td><td>${dato.vigencia}</td><td>${dato.obs}</td>`;
    }

    function exportarExcel() {
        const tabla = document.getElementById("tablaCoberturas");
        const wb = XLSX.utils.table_to_book(tabla, {sheet: "Coberturas"});
        XLSX.writeFile(wb, "Reporte_Coberturas_APO.xlsx");
    }
</script>

<script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
</body>
</html>
