<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Coberturas - APO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f7; margin: 0; padding: 0; }
        
        /* Barra superior azul */
        .nav-header { background-color: #003366; color: white; padding: 10px 20px; display: flex; align-items: center; font-size: 14px; }
        .nav-header span { margin-left: auto; }

        /* Contenedor principal (Tarjeta blanca) */
        .main-card { max-width: 1000px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h2 { color: #003366; border-bottom: 2px solid #00b1b2; padding-bottom: 15px; margin-top: 0; font-size: 24px; }

        /* Formulario Estilo Original */
        .grid-form { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 25px; }
        .form-item { display: flex; flex-direction: column; }
        .form-item.wide { grid-column: span 3; }
        
        label { font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px; }
        input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: #fafafa; }
        input:focus { border-color: #00b1b2; outline: none; background: white; }

        /* Botones Originales */
        .btn-container { display: flex; gap: 15px; margin: 30px 0; }
        button { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .btn-blue { background-color: #003366; color: white; }
        .btn-green { background-color: #28a745; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Tabla Original */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #00b1b2; color: white; padding: 15px; text-align: left; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #eee; color: #555; font-size: 14px; }
        tr:hover { background-color: #f9f9f9; }

        .footer { text-align: center; margin-top: 40px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>

<div class="nav-header">
    <strong>APO - Gestión de Personal</strong>
    <span>SIPROSA - Tucumán</span>
</div>

<div class="main-card">
    <h2>Registro de Cobertura de Cargos</h2>
    
    <div class="grid-form">
        <div class="form-item">
            <label>Nombre del Agente:</label>
            <input type="text" id="nombre" placeholder="Apellido y Nombre">
        </div>
        <div class="form-item">
            <label>DNI:</label>
            <input type="text" id="dni">
        </div>
        <div class="form-item">
            <label>Función / Cargo:</label>
            <input type="text" id="cargo">
        </div>
        <div class="form-item wide">
            <label>Vigencia:</label>
            <input type="text" id="vigencia" placeholder="Desde - Hasta">
        </div>
        <div class="form-item wide">
            <label>Observaciones:</label>
            <textarea id="obs" rows="3" placeholder="Motivo del reemplazo, titular, etc."></textarea>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-blue" onclick="saveData()">Registrar en Tabla</button>
        <button class="btn-green" onclick="exportExcel()">Descargar Reporte Excel</button>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th>Fecha Carga</th>
                <th>Agente</th>
                <th>DNI</th>
                <th>Cargo</th>
                <th>Vigencia</th>
                <th>Observaciones</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="footer">
        Área Programática Oeste | Hospitales y CAPS | Departamento de Personal
    </div>
</div>

<script>
    // Cargar datos al iniciar
    window.onload = function() {
        const stored = JSON.parse(localStorage.getItem('apo_data') || '[]');
        stored.reverse().forEach(item => addRow(item));
    };

    function saveData() {
        const item = {
            fecha: new Date().toLocaleDateString(),
            nombre: document.getElementById('nombre').value,
            dni: document.getElementById('dni').value,
            cargo: document.getElementById('cargo').value,
            vigencia: document.getElementById('vigencia').value,
            obs: document.getElementById('obs').value
        };

        if(!item.nombre) return alert("Por favor, ingrese el nombre.");

        const list = JSON.parse(localStorage.getItem('apo_data') || '[]');
        list.push(item);
        localStorage.setItem('apo_data', JSON.stringify(list));

        addRow(item, true);
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
    }

    function addRow(item, isNew = false) {
        const body = document.getElementById('tableBody');
        const row = body.insertRow(isNew ? 0 : -1);
        row.innerHTML = `<td>${item.fecha}</td><td>${item.nombre}</td><td>${item.dni}</td><td>${item.cargo}</td><td>${item.vigencia}</td><td>${item.obs}</td>`;
    }

    function exportExcel() {
        const table = document.getElementById("mainTable");
        const wb = XLSX.utils.table_to_book(table, {sheet: "Registros"});
        XLSX.writeFile(wb, "Reporte_Coberturas_APO.xlsx");
    }
</script>

</body>
</html>
